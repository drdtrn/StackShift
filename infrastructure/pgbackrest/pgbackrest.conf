# Canonical pgBackRest configuration for the production StackSift cluster.
# Lives outside the Postgres image so the same config flows to:
#   - the Postgres pod (mounted at /etc/pgbackrest/pgbackrest.conf)
#   - the backup CronJob pods (full + diff — share the same stanza)
#   - the restore drill runbook (Plan 09 §9.10)
#
# In production this file is rendered from a Helm template + sourced
# from External Secrets (Plan 08 §9). The values below are placeholders
# safe to commit — every real-credential field is interpolated at deploy
# time from secretRef.
#
# Local dev uses the env-templated version baked into the Postgres image
# (see infrastructure/docker/postgres/pgbackrest.conf.template); this
# committed file is the source of truth for cluster deploys.

[global]
repo1-type=s3
repo1-s3-endpoint=s3.eu-central-1.amazonaws.com
repo1-s3-bucket=stacksift-pg-backup
repo1-s3-region=eu-central-1
repo1-s3-uri-style=host
repo1-path=/stacksift
repo1-retention-full=4
repo1-retention-diff=14
repo1-retention-archive=14
repo1-cipher-type=aes-256-cbc
repo1-storage-verify-tls=y
process-max=4
log-level-console=info
log-level-file=detail
start-fast=y
delta=y

# repo1-s3-key and repo1-s3-key-secret are injected via env at runtime —
# never committed. See infrastructure/k8s/backup-postgres-{full,diff}.yaml
# for the env wiring and Plan 08 §9 for the secrets strategy.

[stacksift]
pg1-path=/var/lib/postgresql/data
pg1-port=5432
pg1-user=postgres
