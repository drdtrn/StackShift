apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: true
    jsonData:
      maxLines: 1000
      derivedFields:
        - matcherRegex: "CorrelationId\":\"([^\"]+)\""
          name: CorrelationId
          url: '/explore?left={"queries":[{"expr":"{app=\"stacksift\"} | json | CorrelationId=\"${__value.raw}\""}]}'
