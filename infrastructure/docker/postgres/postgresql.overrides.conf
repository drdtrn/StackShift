# StackSift Postgres overrides. Appended to postgresql.conf by the initdb
# hook on first cluster init. Idempotent — re-applying produces the same
# file because the include marker is a uniquely-prefixed comment.
#
# Continuous WAL archiving is the foundation of PITR (Plan 09 §9.4):
# every WAL segment is archived to the pgbackrest repo as soon as it is
# closed; the [stacksift] stanza ties the archive prefix back to the same
# repo as full + differential backups.
#
# auto_explain captures slow queries — paired with pg_stat_statements
# (enabled via EF migration EnablePgExtensions in Phase 12) to give the
# DBA dashboard real data without an ALTER SYSTEM at runtime.

# === pgBackRest archiving ===
wal_level = replica
archive_mode = on
archive_command = 'pgbackrest --stanza=stacksift archive-push %p'
archive_timeout = 60s
max_wal_senders = 3

# === auto_explain (Plan 09 §9.13) ===
shared_preload_libraries = 'pg_stat_statements,auto_explain'
auto_explain.log_min_duration = '250ms'
auto_explain.log_analyze = on
auto_explain.log_buffers = on
auto_explain.log_format = json
auto_explain.log_nested_statements = on
log_min_duration_statement = 250ms
log_lock_waits = on
log_temp_files = 0

# === connection pool sane defaults ===
max_connections = 200
