version: '3.9'

networks:
  stacksift-net:
    driver: bridge

volumes:
  postgres_data:
  pgbackrest_data:
  pgbackrest_logs:
  pgbackrest_spool:
  elasticsearch_data:
  redis_data:
  rabbitmq_data:
  keycloak_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  uptime_kuma_data:
  loki_data:
  minio_data:
  tempo_data:

services:

  # ──────────────────────────────────────────────
  # DATABASE — PostgreSQL 16 + pgvector
  # ──────────────────────────────────────────────
  postgres:
    image: stacksift-postgres:local
    container_name: stacksift-postgres
    restart: unless-stopped
    build:
      context: ./postgres
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stacksift}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stacksift_secret}
      POSTGRES_DB: ${POSTGRES_DB:-stacksift}
      # pgBackRest — point local-dev backups at the MinIO bucket the
      # stack already ships. Production overrides via External Secrets.
      PGBACKREST_REPO1_TYPE: s3
      PGBACKREST_REPO1_S3_ENDPOINT: minio:9000
      PGBACKREST_REPO1_S3_BUCKET: stacksift-pg-backup
      PGBACKREST_REPO1_S3_REGION: us-east-1
      PGBACKREST_REPO1_S3_KEY: ${MINIO_ROOT_USER:-minioadmin}
      PGBACKREST_REPO1_S3_KEY_SECRET: ${MINIO_ROOT_PASSWORD:-minioadmin_secret}
      PGBACKREST_REPO1_S3_URI_STYLE: path
      PGBACKREST_REPO1_STORAGE_VERIFY_TLS: "n"
      PGBACKREST_REPO1_CIPHER_PASS: ${PGBACKREST_REPO1_CIPHER_PASS:-stacksift-dev-cipher-pass-change-in-prod}
      PGBACKREST_PG1_PATH: /var/lib/postgresql/data
      PGBACKREST_PG1_PORT: "5432"
      PGBACKREST_PG1_USER: ${POSTGRES_USER:-stacksift}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - pgbackrest_data:/var/lib/pgbackrest
      - pgbackrest_logs:/var/log/pgbackrest
      - pgbackrest_spool:/var/spool/pgbackrest
    networks:
      - stacksift-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stacksift}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # SEARCH & LOG INDEXING — Elasticsearch 8.12.0
  # ──────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: stacksift-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      # Local dev runs ES without auth; production sets xpack.security.enabled=true
      # via env override (Plan 09 §9.12 / ADR 0010). The bootstrap (Plan 11 §11.E)
      # provisions the elastic + stacksift_writer users alongside the ILM policies.
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - stacksift-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ──────────────────────────────────────────────
  # CACHING & SIGNALR BACKPLANE — Redis
  # ──────────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: stacksift-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - stacksift-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # MESSAGE BROKER — RabbitMQ
  # ──────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: stacksift-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-stacksift}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-stacksift_secret}
      RABBITMQ_PLUGINS: rabbitmq_management rabbitmq_prometheus
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI
      - "15692:15692"   # Prometheus metrics
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - stacksift-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ──────────────────────────────────────────────
  # MAIL CATCHER — Mailpit
  # SMTP on 1025, web UI on 8025. The backend's appsettings.json points at
  # localhost:1025 with UseSsl=false, so no extra config is needed. Used for
  # invitation emails, member-added notifications, and email-flow QA.
  # Open http://localhost:8025 to inspect captured messages.
  # ──────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: stacksift-mailpit
    restart: unless-stopped
    environment:
      # Cap stored messages so a long-running dev session doesn't grow unbounded.
      MP_MAX_MESSAGES: "500"
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - stacksift-net

  # ──────────────────────────────────────────────
  # IDENTITY PROVIDER — Keycloak
  # ──────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: stacksift-keycloak
    restart: unless-stopped
    # --import-realm scans /opt/keycloak/data/import on first boot and imports
    # any realm JSON found there. Idempotent — skipped if the realm already exists.
    # To force a reimport: docker compose down -v && docker compose up -d
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-stacksift}
      KC_DB_USERNAME: ${POSTGRES_USER:-stacksift}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-stacksift_secret}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-dev_only_admin_secret_DO_NOT_USE_IN_PROD}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ../keycloak/stacksift-realm.json:/opt/keycloak/data/import/stacksift-realm.json:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stacksift-net
    healthcheck:
      # The Keycloak Quarkus image ships without curl or wget. /bin/bash's /dev/tcp
      # writes a raw HTTP request; the first response line must be 200/301/302
      # before we treat the IdP as ready. Gives api/frontend a stable depends_on.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /realms/master/.well-known/openid-configuration HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -m1 -q '200\\|301\\|302' <&3 || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 20

  # ──────────────────────────────────────────────
  # METRICS — Prometheus
  # ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: stacksift-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - stacksift-net
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: stacksift-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-stacksift}:${POSTGRES_PASSWORD:-stacksift_secret}@postgres:5432/${POSTGRES_DB:-stacksift}?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stacksift-net

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: stacksift-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - stacksift-net

  # ──────────────────────────────────────────────
  # LOG AGGREGATION — Loki
  # Serilog.Sinks.Grafana.Loki ships log batches over HTTP to /loki/api/v1/push.
  # Single-binary mode (filesystem storage) — fine for dev and capstone volume.
  # ──────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    container_name: stacksift-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    networks:
      - stacksift-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  tempo:
    image: grafana/tempo:2.5.0
    container_name: stacksift-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    networks:
      - stacksift-net

  # ──────────────────────────────────────────────
  # DASHBOARDS — Grafana
  # ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: stacksift-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin_secret}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - stacksift-net

  # ──────────────────────────────────────────────
  # OBJECT STORAGE — MinIO (S3-compatible)
  # API: 9000, Console UI: 9001
  # ──────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: stacksift-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - stacksift-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Runs once to create the stacksift-uploads + stacksift-pg-backup buckets.
  # Exits 0 on success. stacksift-pg-backup is the pgBackRest repo bucket
  # used by the postgres container; without it, archive_command crashes.
  minio-init:
    image: minio/mc:latest
    container_name: stacksift-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin_secret}; do
        echo 'Waiting for MinIO...'; sleep 2;
      done &&
      mc mb --ignore-existing local/stacksift-uploads &&
      mc mb --ignore-existing local/stacksift-pg-backup &&
      mc mb --ignore-existing local/stacksift-es-backup &&
      echo 'MinIO buckets ready'
      "
    networks:
      - stacksift-net

  # ──────────────────────────────────────────────
  # UPTIME MONITORING — Uptime Kuma
  # ──────────────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: stacksift-uptime-kuma
    restart: unless-stopped
    ports:
      - "3002:3001"
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - stacksift-net

  # ──────────────────────────────────────────────
  # Auxiliary backup smoke — Keycloak realm export + RabbitMQ definitions
  # export against the local stack. Opt-in via `--profile backup-smoke`:
  #   docker compose --profile backup-smoke run --rm keycloak-export
  #   docker compose --profile backup-smoke run --rm rabbitmq-export
  # Both commands write to the stacksift-backup-smoke bucket in MinIO.
  # ──────────────────────────────────────────────
  keycloak-export:
    image: quay.io/keycloak/keycloak:latest
    profiles: ["backup-smoke"]
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        /opt/keycloak/bin/kc.sh export --dir=/tmp/realm-export --realm=stacksift --users=different_files
        ls -la /tmp/realm-export
        echo '[smoke] Keycloak realm export OK. Files emitted above would be uploaded to S3 in prod.'
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-stacksift}
      KC_DB_USERNAME: ${POSTGRES_USER:-stacksift}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-stacksift_secret}
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - stacksift-net

  rabbitmq-export:
    image: rabbitmq:3-management-alpine
    profiles: ["backup-smoke"]
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        rabbitmqctl -n rabbit@stacksift-rabbitmq export_definitions /tmp/definitions.json
        echo '[smoke] RabbitMQ definitions exported:'
        head -c 200 /tmp/definitions.json
        echo
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - stacksift-net

  # ──────────────────────────────────────────────
  # pgBackRest first-boot — creates the stacksift stanza in the repo and
  # takes the first full backup. Opt-in via `--profile pgbackrest-init`:
  #   docker compose --profile pgbackrest-init run --rm pgbackrest-init
  # Idempotent — re-running on an initialised stanza is a no-op aside
  # from a fresh full backup.
  # ──────────────────────────────────────────────
  pgbackrest-init:
    image: stacksift-postgres:local
    container_name: stacksift-pgbackrest-init
    profiles: ["pgbackrest-init"]
    build:
      context: ./postgres
      dockerfile: Dockerfile
    environment:
      PGBACKREST_REPO1_TYPE: s3
      PGBACKREST_REPO1_S3_ENDPOINT: minio:9000
      PGBACKREST_REPO1_S3_BUCKET: stacksift-pg-backup
      PGBACKREST_REPO1_S3_REGION: us-east-1
      PGBACKREST_REPO1_S3_KEY: ${MINIO_ROOT_USER:-minioadmin}
      PGBACKREST_REPO1_S3_KEY_SECRET: ${MINIO_ROOT_PASSWORD:-minioadmin_secret}
      PGBACKREST_REPO1_S3_URI_STYLE: path
      PGBACKREST_REPO1_STORAGE_VERIFY_TLS: "n"
      PGBACKREST_REPO1_CIPHER_PASS: ${PGBACKREST_REPO1_CIPHER_PASS:-stacksift-dev-cipher-pass-change-in-prod}
      PGBACKREST_PG1_PATH: /var/lib/postgresql/data
      PGBACKREST_PG1_PORT: "5432"
      PGBACKREST_PG1_USER: ${POSTGRES_USER:-stacksift}
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-stacksift}
      PGPASSWORD: ${POSTGRES_PASSWORD:-stacksift_secret}
      PGDATABASE: ${POSTGRES_DB:-stacksift}
    entrypoint: >
      /bin/bash -c "
      stacksift-pg-overlay.sh true &&
      pgbackrest --stanza=stacksift --log-level-console=info stanza-create &&
      pgbackrest --stanza=stacksift --log-level-console=info check &&
      pgbackrest --stanza=stacksift --log-level-console=info --type=full backup
      "
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - stacksift-net

  # ──────────────────────────────────────────────
  # SCHEMA MIGRATION — runs to completion, then exits.
  # Opt-in via `--profile migrate` so the default `docker compose up` flow
  # does not boot it; the API container no longer runs migrations on start.
  #   First boot:   docker compose --profile migrate run --rm migrate
  #   After bump:   same command before `docker compose up -d api`
  # ──────────────────────────────────────────────
  migrate:
    image: stacksift-migrator:local
    container_name: stacksift-migrate
    profiles: ["migrate"]
    build:
      context: ../../src/backend
      dockerfile: StackSift.MigrationRunner/Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-local}
        BUILD_DATE: ${BUILD_DATE:-local}
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-stacksift};Username=${POSTGRES_USER:-stacksift};Password=${POSTGRES_PASSWORD:-stacksift_secret}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stacksift-net

  # ──────────────────────────────────────────────
  # APPLICATION — .NET 10 API
  # Runtime secrets (Stripe / OpenAI / Keycloak client secrets) are read from
  # .env.local at the repo root via env_file. Everything else is wired here.
  # ──────────────────────────────────────────────
  api:
    image: stacksift-api:local
    container_name: stacksift-api
    restart: unless-stopped
    build:
      context: ../../src/backend
      dockerfile: StackSift.Api/Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-local}
        BUILD_DATE: ${BUILD_DATE:-local}
    env_file:
      - path: ../../.env.local
        required: false
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-stacksift};Username=${POSTGRES_USER:-stacksift};Password=${POSTGRES_PASSWORD:-stacksift_secret}"
      Elasticsearch__Uri: http://elasticsearch:9200
      Redis__ConnectionString: redis:6379
      RabbitMq__Host: rabbitmq
      RabbitMq__VirtualHost: /
      RabbitMq__Username: ${RABBITMQ_USER:-stacksift}
      RabbitMq__Password: ${RABBITMQ_PASS:-stacksift_secret}
      Smtp__Host: mailpit
      Smtp__Port: "1025"
      Smtp__UseSsl: "false"
      App__FrontendBaseUrl: http://localhost:3000
      Storage__S3__Endpoint: http://minio:9000
      Storage__S3__PublicEndpoint: http://localhost:9000
      Storage__S3__AccessKey: ${MINIO_ROOT_USER:-minioadmin}
      Storage__S3__SecretKey: ${MINIO_ROOT_PASSWORD:-minioadmin_secret}
      Storage__S3__BucketName: stacksift-uploads
      Storage__S3__Region: us-east-1
      Serilog__Loki__Url: http://loki:3100
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      Keycloak__AuthServerUrl: http://keycloak:8080
      Keycloak__Realm: stacksift
      Keycloak__Resource: stacksift-api
      Keycloak__VerifyTokenAudience: "true"
      Keycloak__RequireHttpsMetadata: "false"
      Keycloak__Admin__RealmUrl: http://keycloak:8080/realms/stacksift
      Keycloak__Admin__AdminBaseUrl: http://keycloak:8080/admin/realms/stacksift
      Keycloak__Admin__AdminClientId: stacksift-backend-admin
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      mailpit:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    ports:
      - "5190:5190"
    networks:
      - stacksift-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5190/health/live || exit 1"]
      interval: 15s
      timeout: 3s
      start_period: 30s
      retries: 5

  # ──────────────────────────────────────────────
  # APPLICATION — Dashboard (Next.js 16)
  # NEXT_PUBLIC_* values are baked at build time. Server-only env vars (cookie
  # signing key, Keycloak client secret, internal Keycloak URL) flow at runtime.
  # ──────────────────────────────────────────────
  frontend:
    image: stacksift-frontend:local
    container_name: stacksift-frontend
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: src/frontend/Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-local}
        BUILD_DATE: ${BUILD_DATE:-local}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5190}
        NEXT_PUBLIC_AUTH_MOCK: "false"
        NEXT_PUBLIC_SIGNALR_MOCK: "false"
    env_file:
      - path: ../../.env.local
        required: false
    environment:
      NODE_ENV: production
      BACKEND_URL: http://api:5190
      # The browser uses NEXT_PUBLIC_KEYCLOAK_URL (baked at build) for authorize
      # and logout redirects; the BFF uses KEYCLOAK_INTERNAL_URL for token,
      # userinfo, and jwks calls inside the docker network.
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      NEXT_PUBLIC_KEYCLOAK_URL: ${NEXT_PUBLIC_KEYCLOAK_URL:-http://localhost:8080}
      NEXT_PUBLIC_KEYCLOAK_REALM: stacksift
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: stacksift-frontend
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - stacksift-net
    healthcheck:
      # BusyBox wget resolves `localhost` to ::1; Next binds IPv4 only.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/healthz || exit 1"]
      interval: 15s
      timeout: 3s
      start_period: 15s
      retries: 5

  # ──────────────────────────────────────────────
  # APPLICATION — Marketing site (Next.js 16)
  # ──────────────────────────────────────────────
  marketing:
    image: stacksift-marketing:local
    container_name: stacksift-marketing
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: src/marketing/Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-local}
        BUILD_DATE: ${BUILD_DATE:-local}
        NEXT_PUBLIC_APP_BASE_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "3200:3200"
    networks:
      - stacksift-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3200/api/health || exit 1"]
      interval: 15s
      timeout: 3s
      start_period: 15s
      retries: 5
