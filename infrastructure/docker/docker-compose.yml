version: '3.9'

networks:
  stacksift-net:
    driver: bridge

volumes:
  postgres_data:
  elasticsearch_data:
  redis_data:
  rabbitmq_data:
  keycloak_data:
  prometheus_data:
  grafana_data:
  uptime_kuma_data:
  loki_data:
  minio_data:

services:

  # ──────────────────────────────────────────────
  # DATABASE — PostgreSQL 16 + pgvector
  # ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: stacksift-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stacksift}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stacksift_secret}
      POSTGRES_DB: ${POSTGRES_DB:-stacksift}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - stacksift-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stacksift}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # SEARCH & LOG INDEXING — Elasticsearch 8.12.0
  # ──────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: stacksift-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - stacksift-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ──────────────────────────────────────────────
  # CACHING & SIGNALR BACKPLANE — Redis
  # ──────────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: stacksift-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - stacksift-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # MESSAGE BROKER — RabbitMQ
  # ──────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: stacksift-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-stacksift}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-stacksift_secret}
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - stacksift-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ──────────────────────────────────────────────
  # IDENTITY PROVIDER — Keycloak
  # ──────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: stacksift-keycloak
    restart: unless-stopped
    # --import-realm scans /opt/keycloak/data/import on first boot and imports
    # any realm JSON found there. Idempotent — skipped if the realm already exists.
    # To force a reimport: docker compose down -v && docker compose up -d
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-stacksift}
      KC_DB_USERNAME: ${POSTGRES_USER:-stacksift}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-stacksift_secret}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_secret}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ../keycloak/stacksift-realm.json:/opt/keycloak/data/import/stacksift-realm.json:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stacksift-net

  # ──────────────────────────────────────────────
  # METRICS — Prometheus
  # ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: stacksift-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - stacksift-net
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'

  # ──────────────────────────────────────────────
  # LOG AGGREGATION — Loki
  # Serilog.Sinks.Grafana.Loki ships log batches over HTTP to /loki/api/v1/push.
  # Single-binary mode (filesystem storage) — fine for dev and capstone volume.
  # ──────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    container_name: stacksift-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./loki/local-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - stacksift-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────────────────
  # DASHBOARDS — Grafana
  # ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: stacksift-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin_secret}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - stacksift-net

  # ──────────────────────────────────────────────
  # OBJECT STORAGE — MinIO (S3-compatible)
  # API: 9000, Console UI: 9001
  # ──────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: stacksift-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - stacksift-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Runs once to create the stacksift-uploads bucket. Exits 0 on success.
  minio-init:
    image: minio/mc:latest
    container_name: stacksift-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin_secret}; do
        echo 'Waiting for MinIO...'; sleep 2;
      done &&
      mc mb --ignore-existing local/stacksift-uploads &&
      echo 'MinIO bucket ready'
      "
    networks:
      - stacksift-net

  # ──────────────────────────────────────────────
  # UPTIME MONITORING — Uptime Kuma
  # ──────────────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: stacksift-uptime-kuma
    restart: unless-stopped
    ports:
      - "3002:3001"
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - stacksift-net
