{{/* Redis — cache + SignalR backplane. Password-protected, no persistence (cache
     is rebuildable; backplane is transient). */}}
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels: {{- include "stacksift.labels" . | nindent 4 }}
spec:
  selector: {{- include "stacksift.selector" (dict "ctx" . "component" "redis") | nindent 4 }}
  ports:
    - { name: redis, port: 6379, targetPort: 6379 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels: {{- include "stacksift.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: {{- include "stacksift.selector" (dict "ctx" . "component" "redis") | nindent 6 }}
  template:
    metadata:
      labels: {{- include "stacksift.selector" (dict "ctx" . "component" "redis") | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)", "--maxmemory", "96mb", "--maxmemory-policy", "allkeys-lru", "--save", ""]
          env:
            - { name: REDIS_PASSWORD, valueFrom: { secretKeyRef: { name: {{ include "stacksift.appSecret" . }}, key: REDIS_PASSWORD } } }
          ports:
            - { name: redis, containerPort: 6379 }
          readinessProbe:
            exec: { command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep -q PONG"] }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{- toYaml .Values.redis.resources | nindent 12 }}
