<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're in — welcome to {{orgName}}</title>
</head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f5f5f5;padding:32px 0;">
    <tr><td align="center">
      <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">

        <tr>
          <td style="background:#0f172a;padding:24px 32px;">
            <span style="color:#f8fafc;font-size:20px;font-weight:700;letter-spacing:-0.3px;">StackSift</span>
            <span style="color:#64748b;font-size:14px;margin-left:12px;">Team membership</span>
          </td>
        </tr>

        <tr>
          <td style="padding:28px 32px 8px;">
            <h1 style="margin:0 0 6px;font-size:22px;font-weight:700;color:#0f172a;">You've been added to {{orgName}}</h1>
            <p style="margin:0;font-size:14px;color:#475569;">Your role: <strong>{{role}}</strong>.</p>
          </td>
        </tr>

        <tr>
          <td style="padding:16px 32px 32px;">
            <a href="{{appUrl}}/" style="display:inline-block;background:#2563eb;color:#ffffff;text-decoration:none;padding:12px 20px;border-radius:6px;font-weight:600;font-size:14px;">Open StackSift</a>
          </td>
        </tr>

        <tr>
          <td style="padding:0 32px 28px;border-top:1px solid #e2e8f0;">
            <p style="margin:18px 0 0;font-size:12px;color:#94a3b8;">
              You're receiving this because the owner of {{orgName}} added you as a member in StackSift.
            </p>
          </td>
        </tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
