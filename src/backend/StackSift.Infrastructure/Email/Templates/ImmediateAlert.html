<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{severity}} Alert: {{alertTitle}}</title>
</head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f5f5f5;padding:32px 0;">
    <tr><td align="center">
      <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">

        <!-- Header -->
        <tr>
          <td style="background:#0f172a;padding:24px 32px;">
            <span style="color:#f8fafc;font-size:20px;font-weight:700;letter-spacing:-0.3px;">StackSift</span>
            <span style="color:#64748b;font-size:14px;margin-left:12px;">Incident Alert</span>
          </td>
        </tr>

        <!-- Severity badge -->
        <tr>
          <td style="padding:28px 32px 0;">
            <span style="display:inline-block;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;background:{{severityBg}};color:{{severityColor}};">{{severity}}</span>
          </td>
        </tr>

        <!-- Title -->
        <tr>
          <td style="padding:12px 32px 0;">
            <h1 style="margin:0;font-size:22px;font-weight:700;color:#0f172a;line-height:1.3;">{{alertTitle}}</h1>
          </td>
        </tr>

        <!-- Incident metadata -->
        <tr>
          <td style="padding:16px 32px 0;">
            <table width="100%" cellpadding="0" cellspacing="0" style="background:#f8fafc;border-radius:6px;border:1px solid #e2e8f0;">
              <tr>
                <td style="padding:12px 16px;font-size:13px;color:#475569;">
                  <strong style="color:#0f172a;">Incident:</strong> {{incidentTitle}}
                </td>
              </tr>
              <tr>
                <td style="padding:0 16px 12px;font-size:13px;color:#475569;">
                  <strong style="color:#0f172a;">Fired at:</strong> {{firedAt}}
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- Contributing log messages -->
        <tr>
          <td style="padding:24px 32px 0;">
            <h2 style="margin:0 0 12px;font-size:14px;font-weight:700;color:#0f172a;text-transform:uppercase;letter-spacing:0.5px;">Contributing Log Messages</h2>
            <table width="100%" cellpadding="0" cellspacing="0">
              {{logMessages}}
            </table>
          </td>
        </tr>

        <!-- CTA -->
        <tr>
          <td style="padding:28px 32px 32px;">
            <a href="{{incidentUrl}}" style="display:inline-block;padding:12px 24px;background:#3b82f6;color:#ffffff;text-decoration:none;border-radius:6px;font-size:14px;font-weight:600;">View Incident</a>
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td style="padding:20px 32px;border-top:1px solid #e2e8f0;font-size:12px;color:#94a3b8;">
            This alert was sent by StackSift. To manage your notification settings, visit your dashboard.
          </td>
        </tr>

      </table>
    </td></tr>
  </table>
</body>
</html>
