name: docker-build

# Builds, scans, lints, and publishes the three application images to GHCR.
#
# Tag taxonomy (per zhelpers/PRE-DEPLOY/04-containerization/plan.md §4.7):
#   :sha-<short>   every push (any branch) — precise pin for rollback
#   :develop       push to develop          — what staging tracks
#   :main          push to main             — what prod tracks
#   :v<semver>     release tag v*.*.*       — immutable release
#   :latest        release tag v*.*.*       — floating latest stable
#
# Pull requests build and scan only — no push, so review noise stays out of
# the registry. The `if: github.event_name != 'pull_request'` guard on the
# push step enforces this.

on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
    paths:
      - 'src/backend/**'
      - 'src/frontend/**'
      - 'src/marketing/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'global.json'
      - '.dockerignore'
      - 'src/backend/.dockerignore'
      - '.github/workflows/docker-build.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/backend/**'
      - 'src/frontend/**'
      - 'src/marketing/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'global.json'
      - '.dockerignore'
      - 'src/backend/.dockerignore'
      - '.github/workflows/docker-build.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: build-${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            image: stacksift-api
            context: src/backend
            dockerfile: src/backend/StackSift.Api/Dockerfile
            build-args: ""
          - service: frontend
            image: stacksift-frontend
            context: .
            dockerfile: src/frontend/Dockerfile
            build-args: |
              NEXT_PUBLIC_API_URL=https://api.stacksift.com
              NEXT_PUBLIC_AUTH_MOCK=false
              NEXT_PUBLIC_SIGNALR_MOCK=false
              NEXT_PUBLIC_KEYCLOAK_URL=https://auth.stacksift.com
              NEXT_PUBLIC_APP_URL=https://app.stacksift.com
          - service: marketing
            image: stacksift-marketing
            context: .
            dockerfile: src/marketing/Dockerfile
            build-args: |
              NEXT_PUBLIC_APP_BASE_URL=https://app.stacksift.com

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase image owner
        id: owner
        run: echo "value=$(echo ${{ env.IMAGE_OWNER }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # metadata-action tags images with the 7-char short SHA (format=short),
      # so scan steps must reference the same short form — using github.sha
      # (full 40 chars) yields a tag that doesn't exist and Trivy falls
      # through to a registry pull that returns DENIED.
      - name: Compute short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Capture build metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
            org.opencontainers.image.licenses=MIT

      # PR builds load into the local daemon so Trivy + Dockle can scan the
      # image before it ever reaches the registry. Push builds use the
      # registry as the cache backend so cross-job/runner cache hits work.
      - name: Build (PR — load locally, no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          load: true
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            ${{ matrix.build-args }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      - name: Trivy scan (HIGH,CRITICAL fail)
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ matrix.image }}:sha-${{ steps.sha.outputs.short }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          trivyignores: .trivyignore

      - name: Dockle lint (FATAL fail)
        if: github.event_name == 'pull_request'
        uses: erzz/dockle-action@v1
        with:
          image: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ matrix.image }}:sha-${{ steps.sha.outputs.short }}
          exit-code: '1'
          failure-threshold: FATAL

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            ${{ matrix.build-args }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      - name: Trivy scan on pushed image
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ matrix.image }}:sha-${{ steps.sha.outputs.short }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          trivyignores: .trivyignore

      - name: Dockle lint on pushed image
        if: github.event_name != 'pull_request'
        uses: erzz/dockle-action@v1
        with:
          image: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ matrix.image }}:sha-${{ steps.sha.outputs.short }}
          exit-code: '1'
          failure-threshold: FATAL
