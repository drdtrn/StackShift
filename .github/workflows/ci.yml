name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Secrets guard — fail if any committed source file leaks a Stripe key.
  # Doc files are excluded so example placeholders stay readable.
  # ---------------------------------------------------------------------------
  secrets-guard:
    name: Stripe secrets guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for real-looking Stripe keys outside docs
        run: |
          set -e
          # Match the prefix followed by 16+ alphanumeric chars — i.e. a real key,
          # not the bare prefix used in docs / regex literals / config keys.
          if git grep -nE '(sk_(test|live)|whsec)_[A-Za-z0-9]{16,}' \
              -- ':(exclude)*.md' \
                 ':(exclude)docs/**' \
                 ':(exclude)zhelpers/**' \
                 ':(exclude).github/workflows/ci.yml' \
                 ':(exclude).cursorrules'; then
            echo "::error::Committed source contains what looks like a real Stripe key."
            exit 1
          fi
          echo "OK — no real-looking Stripe keys found in committed source."

  # ---------------------------------------------------------------------------
  # Detect which parts of the monorepo changed.
  # PRs: only the affected job(s) run.
  # Pushes to main/develop: both jobs always run.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      marketing: ${{ steps.filter.outputs.marketing }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/backend/**'
            frontend:
              - 'src/frontend/**'
              - 'src/shared/**'
            marketing:
              - 'src/marketing/**'

  # ---------------------------------------------------------------------------
  # Backend — .NET 10 Clean Architecture
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (.NET 10)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('src/backend/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore StackSift.slnx

      - name: Build
        run: dotnet build StackSift.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test StackSift.slnx --no-build --configuration Release --verbosity normal

  # ---------------------------------------------------------------------------
  # Frontend — Next.js / pnpm
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (Next.js / pnpm)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'push'
    env:
      NEXT_PUBLIC_AUTH_MOCK: 'true'
      NEXT_PUBLIC_AUTH_MOCK_NEW_USER: 'false'
      NEXT_PUBLIC_API_URL: 'http://localhost:5190'
      NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: src/frontend
        run: pnpm lint

      - name: Typecheck
        working-directory: src/frontend
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        working-directory: src/frontend
        run: |
          echo "::group::Jest suite"
          pnpm exec jest --ci
          echo "::endgroup::"
          echo "Frontend Jest suite passed (floor enforced via jest.globalSetup.ts)"

      - name: Build
        working-directory: src/frontend
        run: pnpm build

  # ---------------------------------------------------------------------------
  # Marketing — Next.js / pnpm (stacksift.io landing page)
  # ---------------------------------------------------------------------------
  marketing:
    name: Marketing (Next.js / pnpm)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.marketing == 'true' || github.event_name == 'push'
    env:
      NEXT_PUBLIC_APP_BASE_URL: 'https://app.stacksift.io'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: src/marketing
        run: pnpm lint

      - name: Typecheck
        working-directory: src/marketing
        run: pnpm typecheck

      - name: Build
        working-directory: src/marketing
        run: pnpm build
