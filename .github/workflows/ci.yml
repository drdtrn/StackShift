name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Detect which parts of the monorepo changed.
  # PRs: only the affected job(s) run.
  # Pushes to main/develop: both jobs always run.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/backend/**'
            frontend:
              - 'src/frontend/**'
              - 'src/shared/**'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'

  # ---------------------------------------------------------------------------
  # Backend — .NET 10 Clean Architecture
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (.NET 10)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('src/backend/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore StackSift.slnx

      - name: Build
        run: dotnet build StackSift.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test StackSift.slnx --no-build --configuration Release --verbosity normal

  # ---------------------------------------------------------------------------
  # Frontend — Next.js / pnpm
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (Next.js / pnpm)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'push'
    env:
      NEXT_PUBLIC_AUTH_MOCK: 'true'
      NEXT_PUBLIC_AUTH_MOCK_NEW_USER: 'false'
      NEXT_PUBLIC_API_URL: 'http://localhost:5190'
      NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: src/frontend
        run: pnpm lint

      - name: Typecheck
        working-directory: src/frontend
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        working-directory: src/frontend
        run: pnpm exec jest --ci

      - name: Build
        working-directory: src/frontend
        run: pnpm build
