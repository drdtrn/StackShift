name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Secrets guard — fail if any committed source file leaks a Stripe key.
  # Doc files are excluded so example placeholders stay readable.
  # ---------------------------------------------------------------------------
  secrets-guard:
    name: Stripe secrets guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for real-looking Stripe keys outside docs
        run: |
          set -e
          # Match the prefix followed by 16+ alphanumeric chars — i.e. a real key,
          # not the bare prefix used in docs / regex literals / config keys.
          if git grep -nE '(sk_(test|live)|whsec)_[A-Za-z0-9]{16,}' \
              -- ':(exclude)*.md' \
                 ':(exclude)docs/**' \
                 ':(exclude)zhelpers/**' \
                 ':(exclude).github/workflows/ci.yml' \
                 ':(exclude).cursorrules'; then
            echo "::error::Committed source contains what looks like a real Stripe key."
            exit 1
          fi
          echo "OK — no real-looking Stripe keys found in committed source."

  # ---------------------------------------------------------------------------
  # Pick runner: prefer the self-hosted [self-hosted, linux, docker] runner
  # when it's online & idle; otherwise fall back to ubuntu-latest so CI keeps
  # moving if the box is asleep, offline, or the API probe fails.
  #
  # Listing self-hosted runners requires admin access on the repo, which the
  # default workflow GITHUB_TOKEN cannot grant itself. Configure a secret
  # named RUNNER_LIST_TOKEN with a fine-grained PAT scoped to:
  #     Repository access: drdtrn/StackSift
  #     Repository permissions → Administration: Read
  # If the secret is missing or the call fails, the probe logs a warning and
  # falls back to ubuntu-latest — safe default, never blocks CI.
  # ---------------------------------------------------------------------------
  pick-runner:
    name: Pick runner
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.pick.outputs.runner }}
    steps:
      - uses: actions/github-script@v7
        id: pick
        with:
          # Empty string when the secret isn't configured — github-script then
          # falls back to GITHUB_TOKEN, which 403s on the runners endpoint and
          # lands cleanly in the catch block below.
          github-token: ${{ secrets.RUNNER_LIST_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const wanted = ['self-hosted', 'linux', 'docker'];
            const fallback = 'ubuntu-latest';
            try {
              const { data } = await github.rest.actions.listSelfHostedRunnersForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              // GitHub's `runs-on` matches labels case-insensitively (e.g. a
              // runner registered with "Linux" still matches `runs-on: linux`),
              // so the probe must do the same — otherwise we'd skip a perfectly
              // good runner just because of label casing.
              const match = data.runners.find(r => {
                if (r.status !== 'online' || r.busy) return false;
                const have = new Set(r.labels.map(l => l.name.toLowerCase()));
                return wanted.every(l => have.has(l.toLowerCase()));
              });
              if (match) {
                core.info(`Using self-hosted runner: ${match.name}`);
                core.setOutput('runner', JSON.stringify(wanted));
                return;
              }
              core.info('No matching self-hosted runner online/idle — falling back to ubuntu-latest.');
            } catch (err) {
              core.warning(
                `Runner probe failed (${err.status ?? '?'}): ${err.message}. ` +
                'Configure RUNNER_LIST_TOKEN with Administration: Read to enable auto-pick.',
              );
            }
            core.setOutput('runner', JSON.stringify(fallback));

  # ---------------------------------------------------------------------------
  # Detect which parts of the monorepo changed.
  # PRs: only the affected job(s) run.
  # Pushes to main/develop: both jobs always run.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      marketing: ${{ steps.filter.outputs.marketing }}
      sdks-serilog: ${{ steps.filter.outputs.sdks-serilog }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/backend/**'
            frontend:
              - 'src/frontend/**'
              - 'src/shared/**'
            marketing:
              - 'src/marketing/**'
            sdks-serilog:
              - 'src/backend/StackSift.Serilog.Sink/**'
              - 'src/backend/StackSift.Serilog.Sink.Tests/**'

  # ---------------------------------------------------------------------------
  # Backend — .NET 10 Clean Architecture
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (.NET 10)
    runs-on: ${{ fromJSON(needs.pick-runner.outputs.runner) }}
    needs: [changes, pick-runner]
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        env:
          # Self-hosted runner: install into the runner-owned tool cache instead
          # of /usr/share/dotnet, which the github-runner user cannot write to.
          DOTNET_INSTALL_DIR: ${{ runner.tool_cache }}/dotnet
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('src/backend/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore StackSift.slnx

      - name: Build
        run: dotnet build StackSift.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test StackSift.slnx --no-build --configuration Release --verbosity normal

  # ---------------------------------------------------------------------------
  # Frontend — Next.js / pnpm
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (Next.js / pnpm)
    runs-on: ${{ fromJSON(needs.pick-runner.outputs.runner) }}
    needs: [changes, pick-runner]
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'push'
    env:
      NEXT_PUBLIC_AUTH_MOCK: 'true'
      NEXT_PUBLIC_AUTH_MOCK_NEW_USER: 'false'
      NEXT_PUBLIC_API_URL: 'http://localhost:5190'
      NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: src/frontend
        run: pnpm lint

      - name: Typecheck
        working-directory: src/frontend
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        working-directory: src/frontend
        run: |
          echo "::group::Jest suite"
          pnpm exec jest --ci
          echo "::endgroup::"
          echo "Frontend Jest suite passed (floor enforced via jest.globalSetup.ts)"

      - name: Build
        working-directory: src/frontend
        run: pnpm build

  # ---------------------------------------------------------------------------
  # Marketing — Next.js / pnpm (stacksift.io landing page)
  # ---------------------------------------------------------------------------
  marketing:
    name: Marketing (Next.js / pnpm)
    runs-on: ${{ fromJSON(needs.pick-runner.outputs.runner) }}
    needs: [changes, pick-runner]
    if: needs.changes.outputs.marketing == 'true' || github.event_name == 'push'
    env:
      NEXT_PUBLIC_APP_BASE_URL: 'https://app.stacksift.io'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: src/marketing
        run: pnpm lint

      - name: Typecheck
        working-directory: src/marketing
        run: pnpm typecheck

      - name: Build
        working-directory: src/marketing
        run: pnpm build

  # ---------------------------------------------------------------------------
  # SDK · Serilog sink — published as StackSift.Serilog.Sink on NuGet.
  # Per-package job runs only when the sink itself changes; backend job above
  # already covers the sink as part of StackSift.slnx for backend-wide changes.
  # ---------------------------------------------------------------------------
  sdks-serilog:
    name: SDK · Serilog sink
    runs-on: ${{ fromJSON(needs.pick-runner.outputs.runner) }}
    needs: [changes, pick-runner]
    if: needs.changes.outputs.sdks-serilog == 'true' || github.event_name == 'push'
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        env:
          DOTNET_INSTALL_DIR: ${{ runner.tool_cache }}/dotnet
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore StackSift.Serilog.Sink/StackSift.Serilog.Sink.csproj

      - name: Build
        run: dotnet build StackSift.Serilog.Sink/StackSift.Serilog.Sink.csproj -c Release --no-restore

      - name: Test
        run: dotnet test StackSift.Serilog.Sink.Tests/StackSift.Serilog.Sink.Tests.csproj -c Release

      - name: Pack
        run: dotnet pack StackSift.Serilog.Sink/StackSift.Serilog.Sink.csproj -c Release -o ./artifacts --no-build

      - name: Upload nupkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: stacksift-serilog-sink-nupkg
          path: src/backend/artifacts/*.nupkg
          retention-days: 14
