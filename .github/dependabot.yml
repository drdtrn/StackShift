version: 2
updates:
  # ── Backend (.NET) ──────────────────────────────────────────────────────
  - package-ecosystem: nuget
    directory: /src/backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      microsoft:
        patterns: ["Microsoft.*", "System.*"]
      observability:
        patterns: ["Serilog*", "OpenTelemetry*", "prometheus-net*"]

  # ── Dashboard (Next.js / pnpm) ──────────────────────────────────────────
  - package-ecosystem: npm
    directory: /src/frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      react:
        patterns: ["react", "react-dom", "@types/react*"]
      next:
        patterns: ["next", "@next/*", "eslint-config-next"]
      tanstack:
        patterns: ["@tanstack/*"]

  # ── Marketing site ──────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /src/marketing
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

  # ── Winston transport SDK ───────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /sdks/winston-transport
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

  # ── Dockerfiles ─────────────────────────────────────────────────────────
  - package-ecosystem: docker
    directory: /src/backend/StackSift.Api
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: /src/frontend
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: /infrastructure/docker/postgres
    schedule:
      interval: weekly

  # ── GitHub Actions ──────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
